apiVersion: v1
kind: Service
metadata:
  name: cinaroom-backend
  namespace: multipass
  labels:
    app: cinaroom
    component: backend
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: cinaroom
    component: backend
---
apiVersion: v1
kind: Service
metadata:
  name: cinaroom-websocket
  namespace: multipass
  labels:
    app: cinaroom
    component: websocket
spec:
  type: ClusterIP
  ports:
  - port: 8081
    targetPort: 8081
    protocol: TCP
    name: ws
  selector:
    app: cinaroom
    component: websocket
