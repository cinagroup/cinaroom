apiVersion: apps/v1
kind: Deployment
metadata:
  name: cinaseek-frontend
  namespace: cinaseek
  labels:
    app: cinaseek
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cinaseek
      component: frontend
  template:
    metadata:
      labels:
        app: cinaseek
        component: frontend
    spec:
      containers:
      - name: frontend
        image: cinagroup/cinaseek-fe:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cinaseek-frontend
  namespace: cinaseek
  labels:
    app: cinaseek
    component: frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: cinaseek
    component: frontend
