apiVersion: v1
kind: Secret
metadata:
  name: cinaroom-secret
  namespace: cinaroom
type: Opaque
stringData:
  # 数据库密码（需替换为实际值）
  DATABASE_PASSWORD: "CHANGE_ME"
  
  # JWT 密钥（需替换为随机生成的安全密钥）
  JWT_SECRET: "CHANGE_ME_GENERATE_A_SECURE_KEY"
  
  # CinaToken OAuth 客户端凭证（需申请）
  CINATOKEN_CLIENT_ID: "CHANGE_ME"
  CINATOKEN_CLIENT_SECRET: "CHANGE_ME"
  
  # Redis 密码（如需要）
  REDIS_PASSWORD: ""
