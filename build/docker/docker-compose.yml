version: '3.8'

services:
  server:
    build:
      context: ../..
      dockerfile: build/docker/Dockerfile.server
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=cinaseek
      - DB_PASSWORD=${DB_PASSWORD:-cinaseek2026}
      - DB_NAME=cinaseek
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: build/docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cinaseek
      POSTGRES_USER: cinaseek
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cinaseek2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinaseek"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  pgdata:
